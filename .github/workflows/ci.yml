name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TMPDIR: /tmp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Secret hygiene guard
        run: python scripts/check_secret_hygiene.py --all

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: python -m ruff check gateway tests

      - name: Type check
        run: python -m mypy gateway

      - name: Tests
        run: python -m pytest

      - name: Policy pipeline (CP4 status)
        if: always()
        run: |
          mkdir -p artifacts/ci
          SNAPSHOT_ID="${GITHUB_RUN_ID:-local}-$(date -u +%Y%m%dT%H%M%SZ)"
          make cp4-status \
            SNAPSHOT_ID="${SNAPSHOT_ID}" \
            TREND_OUTPUT="artifacts/ci/policy_trend_${SNAPSHOT_ID}.json" \
            POLICY_PIPELINE_SUMMARY="artifacts/ci/policy_pipeline_summary.json"

      - name: Validate generated artifact shapes
        if: always()
        run: |
          python scripts/check_generated_artifact_shapes.py \
            --cp3-report artifacts/policy/cp3_readiness_report_example.json \
            --trend-glob "artifacts/ci/policy_trend_*.json"

      - name: Upload policy pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-pipeline-artifacts
          path: |
            artifacts/ci/policy_gate_summary.txt
            artifacts/ci/policy_gate_negative_summary.txt
            artifacts/ci/cp3_readiness_summary.txt
            artifacts/ci/policy_trend_*.json
            artifacts/ci/policy_pipeline_summary.json
            artifacts/policy/cp3_readiness_report_example.json
            docs/policy/CHIMERA_V2_CP4_STATUS_AUTOGENERATED_*.md
          if-no-files-found: warn
