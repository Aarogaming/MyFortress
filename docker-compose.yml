version: "3.9"

services:
  homegateway:
    build: .
    environment:
      HOMEGATEWAY_HOST: 0.0.0.0
      HOMEGATEWAY_PORT: 8100
      HOMEGATEWAY_API_KEY: ${HOMEGATEWAY_API_KEY:-}
      HOMEGATEWAY_HOME_ASSISTANT_URL: ${HOMEGATEWAY_HOME_ASSISTANT_URL:-}
      HOMEGATEWAY_HOME_ASSISTANT_TOKEN: ${HOMEGATEWAY_HOME_ASSISTANT_TOKEN:-}
      HOMEGATEWAY_HOME_ASSISTANT_ENTITIES: ${HOMEGATEWAY_HOME_ASSISTANT_ENTITIES:-}
      HOMEGATEWAY_FRIGATE_URL: ${HOMEGATEWAY_FRIGATE_URL:-}
      HOMEGATEWAY_FRIGATE_API_KEY: ${HOMEGATEWAY_FRIGATE_API_KEY:-}
      HOMEGATEWAY_FRIGATE_CAMERAS: ${HOMEGATEWAY_FRIGATE_CAMERAS:-}
    ports:
      - "8100:8100"
